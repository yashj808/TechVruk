<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Extract images from PDF documents and turn them into editable symbols with custom properties." />
  <title>Symbex — PDF Symbol Extractor & Property Editor</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/index.css" />
  <link rel="stylesheet" href="/src/styles/toolbar.css" />
  <link rel="stylesheet" href="/src/styles/canvas.css" />
  <link rel="stylesheet" href="/src/styles/sidebar.css" />
  <link rel="stylesheet" href="/src/styles/upload.css" />
</head>
<body>
  <!-- ===== TOOLBAR ===== -->
  <header id="toolbar" class="toolbar">
    <div class="toolbar__left">
      <div class="toolbar__brand">
        <img src="/favicon.svg" alt="Symbex" class="toolbar__logo" />
        <span class="toolbar__title">Symbex</span>
      </div>
      <div class="toolbar__divider"></div>
      <button id="btn-upload" class="toolbar__btn" title="Upload PDF">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Upload PDF</span>
      </button>
    </div>
    <div class="toolbar__center">
      <button id="btn-undo" class="toolbar__btn toolbar__btn--icon" title="Undo (Ctrl+Z)" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      </button>
      <button id="btn-redo" class="toolbar__btn toolbar__btn--icon" title="Redo (Ctrl+Shift+Z)" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <div class="toolbar__divider"></div>
      <button id="btn-zoom-out" class="toolbar__btn toolbar__btn--icon" title="Zoom Out">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <span id="zoom-level" class="toolbar__zoom-label">100%</span>
      <button id="btn-zoom-in" class="toolbar__btn toolbar__btn--icon" title="Zoom In">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <button id="btn-fit" class="toolbar__btn toolbar__btn--icon" title="Fit to View">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
      </button>
      <div class="toolbar__divider"></div>
      <button id="btn-grid" class="toolbar__btn toolbar__btn--icon" title="Toggle Grid">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </button>
      <button id="btn-delete" class="toolbar__btn toolbar__btn--icon" title="Delete Selected (Del)" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>
    <div class="toolbar__right">
      <div class="toolbar__export-group">
        <button id="btn-export" class="toolbar__btn toolbar__btn--accent" title="Export">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>Export</span>
        </button>
        <div id="export-dropdown" class="toolbar__dropdown" hidden>
          <button id="btn-export-json" class="toolbar__dropdown-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Export as JSON
          </button>
          <button id="btn-export-zip" class="toolbar__dropdown-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            Export as ZIP (images + JSON)
          </button>
          <button id="btn-export-csv" class="toolbar__dropdown-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
            Export as CSV
          </button>
        </div>
      </div>
      <div class="toolbar__divider"></div>
      <button id="btn-theme" class="toolbar__btn toolbar__btn--icon" title="Toggle Theme">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <main id="app-main" class="app-main">
    <!-- LEFT SIDEBAR: Symbol Library -->
    <aside id="sidebar-left" class="sidebar sidebar--left">
      <div class="sidebar__header">
        <h2 class="sidebar__title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Symbols
        </h2>
        <span id="symbol-count" class="sidebar__badge">0</span>
      </div>
      <div class="sidebar__search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="symbol-search" type="text" placeholder="Search symbols..." class="sidebar__search-input" />
      </div>
      <div id="symbol-list" class="sidebar__list">
        <div class="sidebar__empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <p>Upload a PDF to extract symbols</p>
        </div>
      </div>
    </aside>

    <!-- CANVAS AREA -->
    <section id="canvas-area" class="canvas-area">
      <canvas id="fabric-canvas"></canvas>
    </section>

    <!-- RIGHT SIDEBAR: Property Panel -->
    <aside id="sidebar-right" class="sidebar sidebar--right">
      <div class="sidebar__header">
        <h2 class="sidebar__title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          Properties
        </h2>
      </div>
      <div id="property-content" class="sidebar__content">
        <div class="sidebar__empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          <p>Select a symbol to edit properties</p>
        </div>
      </div>
    </aside>
  </main>

  <!-- ===== UPLOAD OVERLAY ===== -->
  <div id="upload-overlay" class="upload-overlay">
    <div class="upload-zone" id="upload-zone">
      <div class="upload-zone__icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <h2 class="upload-zone__title">Drop your PDF here</h2>
      <p class="upload-zone__subtitle">or click to browse files</p>
      <input id="file-input" type="file" accept=".pdf" hidden />
      <div id="upload-progress" class="upload-zone__progress" hidden>
        <div class="upload-zone__progress-bar">
          <div id="progress-fill" class="upload-zone__progress-fill"></div>
        </div>
        <p id="progress-text" class="upload-zone__progress-text">Extracting images...</p>
      </div>
    </div>
  </div>

  <!-- ===== TOAST NOTIFICATIONS ===== -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ===== STATUS BAR ===== -->
  <footer id="status-bar" class="status-bar">
    <div class="status-bar__left">
      <span id="status-symbols" class="status-bar__item">0 symbols</span>
      <span class="status-bar__separator">|</span>
      <span id="status-selected" class="status-bar__item">0 selected</span>
    </div>
    <div class="status-bar__right">
      <span id="status-autosave" class="status-bar__item status-bar__item--fade">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Saved
      </span>
      <span class="status-bar__separator">|</span>
      <span id="status-zoom" class="status-bar__item">Zoom: 100%</span>
    </div>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
